<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashu OFC Web</title>
    <style>
        /* --- General Styles --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            overflow-x: hidden;
        }

        /* --- Floating Menu Icon --- */
        .menu-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: #000;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            opacity: 0;
            visibility: hidden;
        }

        /* --- Full-Screen Overlay Menu --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1002;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .side-menu.active { transform: translateY(0); }

        .menu-container {
            width: 90%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .menu-card {
            background: #ffffff;
            padding: 15px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .menu-card:hover { background: #000; color: #fff; transform: scale(1.02); }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #000;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        /* --- New Animations for Buttons --- */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- Main Content --- */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            min-height: 100vh;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        .card {
            background-color: #ffffff;
            width: 90%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .menu-title {
            font-weight: 700;
            color: #222;
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            perspective: 1000px;
        }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            opacity: 0; /* මුලින්ම animation එක පටන් ගන්නකන් හංගනවා */
        }

        /* --- Animation Classes --- */
        .animate-left { animation: slideInLeft 0.8s forwards ease-out; }
        .animate-right { animation: slideInRight 0.8s forwards ease-out; }

        /* Button Colors */
        .btn-black { background-color: #000; color: #fff; }
        .btn-outline { border: 2px dashed #000; color: #000; }
        .btn-blue { background-color: #0052cc; color: #fff; }
        .btn-purple { background-color: #6f42c1; color: #fff; }

        .welcome-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; animation: fadeInDown 1s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div id="floating-menu" class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="side-menu" id="sideMenu">
        <div class="close-btn" onclick="toggleMenu()">×</div>
        <div class="menu-container">
            <a href="#" class="menu-card"><span>👤 Owner</span> ➔</a>
            <a href="#" class="menu-card"><span>🛠️ Support</span> ➔</a>
            <a href="#" class="menu-card"><span>👥 Group</span> ➔</a>
            <a href="#" class="menu-card"><span>✈️ Telegram</span> ➔</a>
            <a href="#" class="menu-card"><span>📢 Channel</span> ➔</a>
        </div>
    </div>

    <div id="splash-screen">
        <h1 class="welcome-text">WELCOME</h1>
        <p class="sub-text">RASHU OFC WEB</p>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="menu-title">SELECT AN OPTION</div>
            <div class="button-group">
                <a href="https://rashumodz0715-pky.static.hf.space/index.html" class="btn btn-black" id="b1">🚀 Bot Deploy</a>
                <a href="other.html" class="btn btn-outline" id="b2">💡 Other Service</a>
                
                <a href="#" class="btn btn-blue" id="b3">🌐 Official Web</a>
                <a href="#" class="btn btn-black" id="b4">📥 Download Hub</a>
                <a href="#" class="btn btn-purple" id="b5">💎 Premium Access</a>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                const menuBtn = document.getElementById('floating-menu');

                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';

                main.style.visibility = 'visible';
                main.style.opacity = '1';

                menuBtn.style.visibility = 'visible';
                menuBtn.style.opacity = '1';
                
                // බටන් එකින් එක දෙපැත්තෙන් ඇනිමේෂන් කිරීම
                document.getElementById('b1').classList.add('animate-left');
                setTimeout(() => document.getElementById('b2').classList.add('animate-right'), 200);
                setTimeout(() => document.getElementById('b3').classList.add('animate-left'), 400);
                setTimeout(() => document.getElementById('b4').classList.add('animate-right'), 600);
                setTimeout(() => document.getElementById('b5').classList.add('animate-left'), 800);

                document.body.style.overflow = 'auto';
            }, 3000); 
        });
    </script>

</body>
</html>
