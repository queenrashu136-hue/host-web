<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access | NIPUN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --premium-gold: #ffd700;
            --neon-green: #39FF14;
            --text-color: #ffffff;
            --border-color: #222;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* Modal / Alert Box Style */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }

        .modal {
            background: #0a0a0a; border: 1px solid var(--premium-gold);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .modal h2 { color: var(--premium-gold); margin-bottom: 20px; font-size: 1.2rem; }
        .modal p { font-size: 0.9rem; color: #ccc; margin-bottom: 25px; line-height: 1.6; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            padding: 12px; border-radius: 10px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .btn-yes { background: var(--premium-gold); color: black; }
        .btn-no { background: #222; color: white; border: 1px solid #444; }
        .btn-yes:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--premium-gold); }

        /* Content Area (Hidden until PIN) */
        #main-content { display: none; text-align: center; width: 90%; max-width: 500px; }
        
        .pin-box {
            background: #0a0a0a; border: 1px solid var(--neon-green);
            padding: 30px; border-radius: 20px;
        }

        input {
            width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #333;
            background: #111; color: var(--neon-green); font-size: 1.2rem;
            text-align: center; margin-bottom: 20px; letter-spacing: 5px;
        }

        .status-msg { font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <i data-lucide="crown" color="#ffd700" size="48"></i>
            <h2 id="modal-title">PREMIUM VERIFICATION</h2>
            <p id="modal-desc">
                Are you a Premium User?<br>
                ඔබ ප්‍රීමියම් පරිශීලකයෙක්ද?<br>
                நீங்கள் ஒரு பிரீமியம் பயனரா?
            </p>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="showPinEntry()">YES / ඔව් / ஆம்</button>
                <button class="btn btn-no" onclick="contactOwner()">NO / නැත / இல்லை</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="pin-box">
            <h2 style="color: var(--neon-green); letter-spacing: 2px;">ENTER PREMIUM PIN</h2>
            <input type="password" id="pinInput" placeholder="••••">
            <button class="btn btn-yes" style="width: 80%;" onclick="verifyPin()">UNLOCK ACCESS</button>
            <p id="error-msg" class="status-msg" style="color: #ff4d4d;"></p>
        </div>
    </div>

    <script>
        // Generated 150 Unique Complex PINs (Sample range: 1000 - 9999)
        // මේවා ඔබට අවශ්‍ය ඕනෑම අංක 150 ක් ලෙස වෙනස් කළ හැක
        const premiumPins = [];
        for(let i=1; i<=150; i++) {
            premiumPins.push((Math.floor(Math.random() * 8999) + 1000).toString());
        }
        
        // උදාහරණයක් ලෙස පරීක්ෂා කිරීමට පහත අංකය භාවිතා කරන්න (ඔබට මේ ලැයිස්තුව වෙනස් කළ හැක)
        premiumPins.push("2026"); 

        function showPinEntry() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        function contactOwner() {
            const msg = "ඔබ තවමත් ප්‍රීමියම් පරිශීලකයෙකු නොවේ නම්, කරුණාකර අයිතිකරු සම්බන්ධ කරගෙන ඔබගේ පින් අංකය ලබා ගන්න.\n\nIf you are not a premium user, please contact the owner to get your PIN.\n\nநீங்கள் பிரீமியம் பயனர் இல்லை என்றால், உங்கள் பின்னைப் பெற உரிமையாளரைத் தொடர்பு கொள்ளவும்.";
            alert(msg);
            window.location.href = "https://wa.me/94750292806?text=I+need+to+get+web+Premium+PIN";
        }

        function verifyPin() {
            const input = document.getElementById('pinInput').value;
            const error = document.getElementById('error-msg');

            if (premiumPins.includes(input)) {
                error.style.color = "#39FF14";
                error.innerText = "ACCESS GRANTED! REDIRECTING...";
                setTimeout(() => {
                    // PIN එක හරි නම් යන පිටුව මෙතැනට දාන්න
                    window.location.href = "update.html"; 
                }, 1500);
            } else {
                error.innerText = "INVALID PIN! CONTACT OWNER.";
                document.getElementById('pinInput').value = '';
            }
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
