<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporter Check | NIPUN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --text-color: #ffffff;
            --accent-color: #39FF14; /* Neon Green */
            --border-color: #333;
            --btn-bg: #111;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #000000;
            --accent-color: #008000;
            --border-color: #ddd;
            --btn-bg: #eeeeee;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* Language Switcher */
        .lang-container {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            display: flex; gap: 5px;
        }
        .lang-btn {
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 5px 10px; border-radius: 5px;
            cursor: pointer; font-size: 0.8rem;
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px; border-radius: 50%; cursor: pointer;
        }

        .card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            width: 90%; max-width: 400px; padding: 30px; border-radius: 20px;
            text-align: center; box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }

        .title { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }

        input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color);
            background: #111; color: white; margin-bottom: 15px; text-align: center; font-size: 1rem;
            box-sizing: border-box;
        }

        .check-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: var(--accent-color); color: black; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .check-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent-color); }

        #result {
            margin-top: 25px; padding: 15px; border-radius: 10px; display: none;
            animation: fadeIn 0.5s ease; border: 1px solid var(--border-color);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .owner-res { border-color: var(--accent-color) !important; color: var(--accent-color); }
        .invalid-res { border-color: #ff4d4d !important; color: #ff4d4d; }

        .back-link { margin-top: 20px; display: block; color: gray; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="lang-container">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('si')">සිං</button>
        <button class="lang-btn" onclick="setLang('ta')">தමි</button>
        <button class="lang-btn" onclick="setLang('ar')">عربي</button>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        <i data-lucide="sun"></i>
    </button>

    <div class="card">
        <div class="title" id="page-title">SUPPORTER CHECK</div>
        <input type="text" id="phoneInput" placeholder="Enter Number (e.g. 077...)" maxlength="10">
        <button class="check-btn" onclick="checkNumber()" id="btn-text">CHECK NOW</button>

        <div id="result">
            <i id="res-icon" style="margin-bottom: 10px; display: block;"></i>
            <b id="res-status"></b><br>
            <span id="res-desc" style="font-size: 0.9rem;"></span>
        </div>

        <a href="setting.html" class="back-link" id="back-text">← Back to Settings</a>
    </div>

    <script>
        const owners = ["0778059333", "0764085107", "0750292806"];
        
        const translations = {
            en: { title: "SUPPORTER CHECK", btn: "CHECK NOW", back: "← Back to Settings", placeholder: "Enter Number", owner: "QUEEN RASHU MD OWNER", ownerDesc: "This number is a verified system owner.", invalid: "ACCESS DENIED", invalidDesc: "This number is not an authorized owner." },
            si: { title: "සහායක පරීක්ෂාව", btn: "පරීක්ෂා කරන්න", back: "← ආපසු යාමට", placeholder: "දුරකථන අංකය ඇතුළත් කරන්න", owner: "QUEEN RASHU MD අයිතිකරු", ownerDesc: "මෙම අංකය තහවුරු කරන ලද පද්ධති හිමිකරුවෙකි.", invalid: "ප්‍රවේශය අත්හිටුවන ලදී", invalidDesc: "මෙම අංකය බලයලත් හිමිකරුවෙකු නොවේ." },
            ta: { title: "ஆதரவாளர் சரிபார்ப்பு", btn: "சரிபார்க்கவும்", back: "← அமைப்புகளுக்குத் திரும்பு", placeholder: "எண்ணை உள்ளிடவும்", owner: "QUEEN RASHU MD உரிமையாளர்", ownerDesc: "இந்த எண் சரிபார்க்கப்பட்ட கணினி உரிமையாளர்.", invalid: "அணுகல் மறுக்கப்பட்டது", invalidDesc: "இந்த எண் அங்கீகரிக்கப்பட்ட உரிமையாளர் அல்ல." },
            ar: { title: "فحص الداعم", btn: "تحقق الآن", back: "← العودة إلى الإعدادات", placeholder: "أدخل الرقم", owner: "مالك QUEEN RASHU MD", ownerDesc: "هذا الرقم هو مالك نظام تم التحقق منه.", invalid: "تم رفض الوصول", invalidDesc: "هذا الرقم ليس مالكًا معتمدًا." }
        };

        let currentLang = 'en';

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('page-title').innerText = translations[lang].title;
            document.getElementById('btn-text').innerText = translations[lang].btn;
            document.getElementById('back-text').innerText = translations[lang].back;
            document.getElementById('phoneInput').placeholder = translations[lang].placeholder;
            document.getElementById('result').style.display = 'none';
        }

        function checkNumber() {
            const num = document.getElementById('phoneInput').value.trim();
            const resDiv = document.getElementById('result');
            const resStatus = document.getElementById('res-status');
            const resDesc = document.getElementById('res-desc');
            
            resDiv.style.display = 'block';

            if (owners.includes(num)) {
                resDiv.className = 'owner-res';
                resStatus.innerText = translations[currentLang].owner;
                resDesc.innerText = translations[currentLang].ownerDesc;
                document.getElementById('res-icon').innerHTML = '<i data-lucide="badge-check" style="color:#39FF14"></i>';
            } else {
                resDiv.className = 'invalid-res';
                resStatus.innerText = translations[currentLang].invalid;
                resDesc.innerText = translations[currentLang].invalidDesc;
                document.getElementById('res-icon').innerHTML = '<i data-lucide="shield-alert" style="color:#ff4d4d"></i>';
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.getAttribute('data-theme') === 'light';
            if (isLight) {
                body.removeAttribute('data-theme');
                document.getElementById('theme-btn').innerHTML = '<i data-lucide="sun"></i>';
            } else {
                body.setAttribute('data-theme', 'light');
                document.getElementById('theme-btn').innerHTML = '<i data-lucide="moon"></i>';
            }
            lucide.createIcons();
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
