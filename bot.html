<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Services - Rashu OFC</title>
    <style>
        /* --- General Styles --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            overflow-x: hidden;
        }

        /* --- Back Button --- */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: #000;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .back-btn:hover { transform: scale(1.05); background: #333; }

        /* --- Animations --- */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- Main Content --- */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .page-title {
            font-weight: 800;
            font-size: 1.5rem;
            color: #000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .page-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: block;
            padding: 20px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            opacity: 0; /* මුලින් හංගා තබයි */
        }

        /* Bot Command - කළු පාට */
        .btn-command {
            background-color: #000;
            color: #fff;
        }

        /* Bot Base - Outline (Border) style */
        .btn-base {
            border: 2px dashed #000;
            color: #000;
            background: transparent;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Animation Classes */
        .animate-left { animation: slideInLeft 0.8s forwards ease-out; }
        .animate-right { animation: slideInRight 0.8s forwards ease-out; }

    </style>
</head>
<body>

    <a href="other.html" class="back-btn">← Back</a>

    <div class="container">
        <div class="card">
            <div class="page-title">BOT RESOURCES</div>
            <div class="page-subtitle">Select your requirement below</div>

            <div class="button-group">
                <a href="cmd.html" class="btn btn-command" id="btn1">📜 Bot Command</a>
                
                <a href="base.html" class="btn btn-base" id="btn2">🏗️ Bot Base</a>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            // පිටුව ලෝඩ් වූ පසු ඇනිමේෂන් ආරම්භ කිරීම
            setTimeout(() => {
                document.getElementById('btn1').classList.add('animate-left');
            }, 300);

            setTimeout(() => {
                document.getElementById('btn2').classList.add('animate-right');
            }, 600);
        });
    </script>

</body>
</html>
