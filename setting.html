<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | NIPUN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- Themes --- */
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --text-color: #ffffff;
            --border-color: #333;
            --btn-bg: #111;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #000000;
            --border-color: #ddd;
            --btn-bg: #eeeeee;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            overflow-x: hidden;
        }

        /* --- Theme Toggle --- */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 2001;
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- Dashboard Text --- */
        .dashboard-link {
            position: fixed; top: 25px; left: 25px; z-index: 1001;
            font-weight: 900; letter-spacing: 2px; text-decoration: none;
            color: var(--text-color); font-size: 1.2rem; text-transform: uppercase;
        }

        /* --- Main Content --- */
        .container {
            display: flex; flex-direction: column; align-items: center;
            padding: 100px 0 120px 0; min-height: 100vh;
        }

        .card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            width: 90%; max-width: 400px; padding: 40px 25px; border-radius: 20px;
            text-align: center; animation: slideUp 0.8s forwards ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .menu-title { color: var(--text-color); font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }

        .nav-btn {
            width: 100%; padding: 15px; margin-bottom: 12px;
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); border-radius: 12px;
            font-weight: bold; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-2px); border-color: #555; }
        .nav-btn i { width: 18px; height: 18px; }

        /* Premium Button Style */
        .premium-btn {
            background: linear-gradient(45deg, #ffd700, #ffa500) !important;
            color: #000 !important;
            margin-top: 20px;
            border: none !important;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>

    <a href="index.html" class="dashboard-link">ＤＡＳＨＢＯＲＤ</a>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        <i data-lucide="sun"></i>
    </button>

    <div class="container">
        <div class="card">
            <div class="menu-title">System Configuration</div>
            
            <a href="privacy.html" class="nav-btn">
                <span>Privacy & Security</span> <i data-lucide="shield-check"></i>
            </a>
            
            <a href="update.html" class="nav-btn">
                <span>Update System</span> <i data-lucide="refresh-cw"></i>
            </a>
            
            <a href="errors.html" class="nav-btn">
                <span>Error Logs</span> <i data-lucide="alert-triangle"></i>
            </a>
            
            <a href="owner.html" class="nav-btn">
                <span>Owner Commands</span> <i data-lucide="terminal"></i>
            </a>
            
            <a href="supporter.html" class="nav-btn">
                <span>Supporter Check</span> <i data-lucide="users"></i>
            </a>

            <a href="prm.html" class="nav-btn premium-btn">
                <span>Premium Update</span> <i data-lucide="zap"></i>
            </a>
        </div>
    </div>

    <script>
        function applyTheme(theme) {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (theme === 'light') {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '<i data-lucide="moon"></i>';
            } else {
                body.removeAttribute('data-theme');
                btn.innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            let currentTheme = document.body.getAttribute('data-theme');
            let newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            lucide.createIcons();
        });
    </script>
</body>
</html>
