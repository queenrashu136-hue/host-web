<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Error Logs | NIPUN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0b0b0b;
            --text-color: #ffffff;
            --neon-green: #39FF14;
            --border-color: #222;
            --error-red: #ff4d4d;
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #000000;
            --neon-green: #008000;
            --border-color: #ddd;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 800px; margin: 0 auto 20px auto;
        }

        .lang-btn {
            background: #111; border: 1px solid var(--border-color);
            color: var(--text-color); padding: 5px 12px; border-radius: 5px;
            cursor: pointer; font-size: 0.8rem;
        }

        .log-container {
            max-width: 800px; margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }

        .log-header {
            background: #1a1a1a; padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-dot {
            height: 10px; width: 10px; background-color: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .log-body {
            padding: 20px; height: 400px; overflow-y: auto;
            font-size: 0.85rem; line-height: 1.6;
            display: flex; flex-direction: column-reverse; /* අලුත් ඒවා ඉහළින් පෙන්වීමට */
        }

        .log-entry {
            margin-bottom: 8px; padding: 5px;
            border-left: 2px solid transparent;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .time { color: #666; margin-right: 10px; }
        .type-error { color: var(--error-red); font-weight: bold; }
        .type-info { color: var(--neon-green); font-weight: bold; }
        .msg { color: #eee; }

        .controls {
            max-width: 800px; margin: 20px auto;
            display: flex; justify-content: center; gap: 15px;
        }

        .btn {
            background: none; border: 1px solid; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        .clear-btn { border-color: var(--error-red); color: var(--error-red); }
        .clear-btn:hover { background: var(--error-red); color: white; }

        .back-link {
            text-align: center; display: block; margin-top: 10px;
            color: #555; text-decoration: none; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="status-text"><span class="status-dot"></span> System Live</div>
        <div>
            <button class="lang-btn" onclick="updateLang('en')">EN</button>
            <button class="lang-btn" onclick="updateLang('si')">සිං</button>
            <button class="lang-btn" onclick="updateLang('ta')">தமி</button>
            <button class="lang-btn" onclick="updateLang('ar')">عربي</button>
        </div>
    </div>

    <div class="log-container">
        <div class="log-header">
            <span id="title-text">SYSTEM LIVE LOGS</span>
            <i data-lucide="activity" size="18" color="#39FF14"></i>
        </div>
        <div class="log-body" id="log-box">
            </div>
    </div>

    <div class="controls">
        <button class="btn clear-btn" onclick="clearLogs()" id="clear-text">CLEAR ALL LOGS</button>
    </div>
    
    <a href="setting.html" class="back-link" id="back-text">← Back to Settings</a>

    <script>
        const translations = {
            en: { title: "SYSTEM LIVE LOGS", clear: "CLEAR ALL LOGS", back: "← Back to Settings", status: "System Live" },
            si: { title: "සජීවී පද්ධති වාර්තා", clear: "සියල්ල මකන්න", back: "← ආපසු යාමට", status: "පද්ධතිය ක්‍රියාකාරීයි" },
            ta: { title: "நேரடி கணினி பதிவுகள்", clear: "அனைத்தையும் அழி", back: "← அமைப்புகளுக்கு", status: "சிஸ்டம் லைவ்" },
            ar: { title: "سجلات النظام الحية", clear: "امسح الكل", back: "← العودة", status: "النظام حي" }
        };

        const logMessages = [
            { type: "INFO", msg: "Scanning for updates..." },
            { type: "INFO", msg: "Queen Rashu MD processing request." },
            { type: "ERROR", msg: "Request timed out: Retrying..." },
            { type: "INFO", msg: "New message received from +947..." },
            { type: "ERROR", msg: "Memory usage high: 85%." },
            { type: "INFO", msg: "Media successfully uploaded to server." },
            { type: "INFO", msg: "Session ID: NIPUN_RASHU_MD_SECURED." }
        ];

        function addLog() {
            const logBox = document.getElementById('log-box');
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            
            const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
            
            const div = document.createElement('div');
            div.className = 'log-entry';
            const typeClass = randomLog.type === 'ERROR' ? 'type-error' : 'type-info';
            
            div.innerHTML = `<span class="time">[${timeStr}]</span> <span class="${typeClass}">${randomLog.type}</span>: <span class="msg">${randomLog.msg}</span>`;
            
            logBox.prepend(div); // අලුත් log එක උඩට එකතු කරයි

            // Logs වැඩි වුවහොත් පැරණි ඒවා ඉවත් කිරීමට (Performance සඳහා)
            if (logBox.children.length > 50) {
                logBox.removeChild(logBox.lastChild);
            }
        }

        // සෑම තත්පර 3 කට වරක් අලුත් Log එකක් එකතු වේ
        let logInterval = setInterval(addLog, 3000);

        function clearLogs() {
            const logBox = document.getElementById('log-box');
            logBox.innerHTML = '';
            
            // Clear කළ පසු ටික වේලාවකින් නැවත ආරම්භ කිරීම
            clearInterval(logInterval);
            setTimeout(() => {
                logInterval = setInterval(addLog, 3000);
            }, 1000);
        }

        function updateLang(lang) {
            document.getElementById('title-text').innerText = translations[lang].title;
            document.getElementById('clear-text').innerText = translations[lang].clear;
            document.getElementById('back-text').innerText = translations[lang].back;
            document.getElementById('status-text').innerHTML = `<span class="status-dot"></span> ${translations[lang].status}`;
        }

        window.onload = () => {
            addLog(); // මුලින්ම එකක් එකතු කරයි
            lucide.createIcons();
        };
    </script>
</body>
</html>
